  <g font-family="'Noto Sans JP', sans-serif" fill="#0f172a">
    <text x="320" y="136" font-size="34" font-weight="700">Reveal.js Markdown Template</text>
    <text x="320" y="184" font-size="22" fill="#475569">Build presentation decks from ordered Markdown files.</text>
    <text x="320" y="226" font-size="22" fill="#475569">Config-driven, previewable, and ready for templated reuse.</text>
